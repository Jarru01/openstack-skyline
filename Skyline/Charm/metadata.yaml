name: skyline
display-name: Skyline Dashboard
summary: OpenStack Skyline Dashboard — APIServer + Console (stable/2024.2)
description: |
  Deploys the OpenStack Skyline dashboard (stable/2024.2) inside an LXD
  container, following the source-build approach.

  Components deployed by this charm:
    - MariaDB (local, optional — skipped when database-url is supplied)
    - skyline-apiserver (Python ASGI app served via gunicorn on 127.0.0.1:28000)
    - skyline-console  (React SPA compiled to a Python wheel, served by nginx)
    - nginx            (public listener on listen-port, default 9999)

  Required configuration before the charm becomes Active:
    - keystone-url          full Keystone v3 endpoint URL
    - system-user-password  password of the 'skyline' OpenStack service user

  The OpenStack service user must be created before deploying this charm.
  See the 'actions' section for helper actions.

maintainers:
  - OpenStack Operator

tags:
  - openstack
  - dashboard

series:
  - jammy

requires:
  db:
    interface: mysql
    optional: true

provides:
  website:
    interface: http

peers:
  skyline-peers:
    interface: skyline-peers
